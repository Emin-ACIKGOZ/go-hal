name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Enforce gofmt
        run: |
          test -z "$(gofmt -l .)"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --config=.golangci.yml

      - name: Run tests
        run: go test ./...

      - name: Run race detector
        run: go test -race ./...

      - name: Check test coverage
        run: |
          go test -coverprofile=coverage.out ./...
          coverage=$(go tool cover -func=coverage.out | grep "total:" | awk '{print $NF}' | sed 's/%//')
          echo "Test Coverage: ${coverage}%"
          min_coverage=70.0
          if (( $(echo "$coverage < $min_coverage" | bc -l) )); then
            echo "❌ Coverage ${coverage}% is below minimum ${min_coverage}%"
            exit 1
          fi
          echo "✓ Coverage ${coverage}% meets minimum requirement (${min_coverage}%)"

      - name: Run benchmarks
        run: |
          go test -run=^$ -bench=. -benchmem -benchtime=3s ./... | tee benchmark_results.txt

      - name: Check benchmark regressions
        run: |
          # Store and compare benchmarks
          scripts/check-benchmark-regression.sh
